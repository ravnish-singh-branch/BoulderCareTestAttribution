<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testing Attribution</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8ff47;
      --accent-dim: rgba(232, 255, 71, 0.12);
      --text-primary: #f0f0f0;
      --text-muted: #555;
      --radius: 3px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(232, 255, 71, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 10vw, 110px);
      line-height: 0.92;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.7s 0.25s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    h1 span {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      opacity: 0;
      animation: fadeUp 0.5s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.7s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .btn {
      position: relative;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      padding: 16px 40px;
      border-radius: var(--radius);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s ease;
      background: rgba(255, 255, 255, 0.06);
    }

    .btn:hover::after { opacity: 1; }

    .btn:active {
      transform: scale(0.97) !important;
    }

    /* Primary button */
    .btn-primary {
      background: var(--accent);
      color: #080808;
      box-shadow: 0 0 0 0 rgba(232, 255, 71, 0);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232, 255, 71, 0.3), 0 0 0 1px var(--accent);
    }

    /* Secondary button */
    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
      box-shadow: inset 0 0 0 0 var(--accent-dim);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 0 18px var(--accent-dim);
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0);
      animation: ripple 0.55s linear;
      pointer-events: none;
    }

    .btn-primary .ripple {
      background: rgba(0,0,0,0.12);
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .footer {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 0.6s 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>

    <script>
         // Load Branch
         (function(b,r,a,n,c,h,_,s,d,k){if(!b[n]||!b[n]._q){for(;s<_.length;)c(h,_[s++]);d=r.createElement(a);d.async=1;d.src="https://cdn.branch.io/branch-latest.min.js";k=r.getElementsByTagName(a)[0];k.parentNode.insertBefore(d,k);b[n]=h}})(window,document,"script","branch",function(b,r){b[r]=function(){b._q.push([r,arguments])}},{_q:[],_v:1},"addListener banner closeBanner closeJourney data deepview deepviewCta first init link logout removeListener setBranchViewData setIdentity track trackCommerceEvent logEvent disableTracking getBrowserFingerprintId crossPlatformIds lastAttributedTouchData setAPIResponseCallback qrCode setRequestMetaData setAPIUrl getAPIUrl setDMAParamsForEEA".split(" "), 0);

</head>
<body>

  <div class="container">
    <span class="label">Attribution · RN + Expo</span>

    <h1>Testing<br/><span>Attribution</span></h1>

    <div class="divider"></div>

    <div class="buttons">
      <button class="btn btn-primary" onclick="handleClick(this, 'Primary action triggered', 'https://app.boulder.care/appdownload-oregon?$deeplink_no_attribution=true')">
        Branch Quick Link
      </button>
      <button class="btn btn-secondary" onclick="handleClick(this, 'Secondary action triggered', 'https://boulder.care/app')">
        Simple Link
      </button>
    </div>

    <p class="footer">Select an action to proceed</p>
  </div>

  <script>
    function handleClick(btn, msg, redirectUrl) {
      // Ripple effect
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = ((rect.width - size) / 2) + 'px';
      ripple.style.top  = ((rect.height - size) / 2) + 'px';
      btn.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());

      const footer = document.querySelector('.footer');
      footer.textContent = msg;
      footer.style.color = '#e8ff47';
      
      // Redirect after animation completes
      if (redirectUrl) {
        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 1000);
      } else {
        setTimeout(() => {
          footer.textContent = 'Select an action to proceed';
          footer.style.color = '';
        }, 2000);
      }
    }
  </script>
</body>
</html>
